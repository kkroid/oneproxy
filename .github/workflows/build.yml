name: Build Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - run: choco install innosetup --yes --no-progress

      - name: Build Go DLL
        run: go build -buildmode=c-shared -o trayapp/build/oneproxy.dll ./cmd/oneproxy-dll

      - name: Build Installer
        run: |
          copy configs\config.example.json trayapp\build\config.json
          copy trayapp\installer.iss trayapp\build\
          cd trayapp\build
          iscc installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: OneProxy-Installer
          path: dist/OneProxy-*.exe

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OneProxy-*.exe
