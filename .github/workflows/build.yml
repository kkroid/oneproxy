name: Build Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - run: choco install innosetup --yes --no-progress

      - name: Build Go DLL
        run: go build -buildmode=c-shared -o trayapp/build/oneproxy.dll ./cmd/oneproxy-dll

      - name: Build Installer
        run: |
          copy configs\config.example.json trayapp\build\config.json
          copy trayapp\installer.iss trayapp\build\
          cd trayapp\build
          iscc installer.iss

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body: "Download the installer and double-click to install. See [README.md](README.md) for full documentation."
          files: dist/OneProxy-*.exe
