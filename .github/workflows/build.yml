name: Build Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress

      - name: Build Go DLL
        run: go build -buildmode=c-shared -o oneproxy.dll ./cmd/oneproxy-dll

      - name: Build C++ Tray (MSVC + Qt6)
        run: |
          mkdir -Force trayapp\build
          cd trayapp\build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
          windeployqt Release\oneproxy-tray.exe --no-translations --no-system-d3d-compiler --no-opengl-sw

      - name: Copy Assets
        run: |
          copy .\oneproxy.dll trayapp\build\Release\
          xcopy /E /I /Y bin trayapp\build\Release\bin 2>nul || (mkdir trayapp\build\Release\bin)
          copy configs\config.example.json trayapp\build\Release\config.json
          copy trayapp\green.ico trayapp\build\Release\
          copy trayapp\yellow.ico trayapp\build\Release\
          copy trayapp\red.ico trayapp\build\Release\

      - name: Build Installer
        run: |
          copy trayapp\installer.iss trayapp\build\Release\
          cd trayapp\build\Release
          iscc installer.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: OneProxy-Setup
          path: dist\OneProxy-*-setup.exe

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\OneProxy-*-setup.exe
