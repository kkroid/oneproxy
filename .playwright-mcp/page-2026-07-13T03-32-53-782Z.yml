            - code [ref=f1e747]: auto_detect_interface
            - text: enabled.
          - heading "default_interface" [level=4] [ref=f1e748]
          - paragraph [ref=f1e750]: Only supported on Linux, Windows and macOS.
          - paragraph [ref=f1e751]: Bind outbound connections to the specified NIC by default to prevent routing loops under tun.
          - paragraph [ref=f1e752]:
            - text: Takes no effect if
            - code [ref=f1e753]: auto_detect_interface
            - text: is set.
          - heading "default_mark" [level=4] [ref=f1e754]
